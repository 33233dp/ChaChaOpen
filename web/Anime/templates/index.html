<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anime Vault</title>
  <meta name="description" content="番剧观看管理网页，提供海报墙与详情页浏览体验。">
  <link rel="stylesheet" href="/static/styles.css">
  <script defer src="/static/app.js"></script>
</head>
<body class="catalog-page">
  <div class="page-shell">
    <header class="hero">
      <div class="hero__copy">
        <p class="eyebrow">ANIME VAULT</p>
        <h1>番剧馆藏</h1>
        <p class="hero__text">
          当前馆藏 <span id="catalogCount">{{TOTAL_COUNT}}</span> 部作品。点击海报进入详情页，查看简介、主要演员与主题关键词。
        </p>
      </div>
      <div class="hero__tools">
        <label class="search-box" for="searchInput">
          <span>快速筛选</span>
          <input id="searchInput" type="search" placeholder="输入标题、题材或关键词">
        </label>
        <p class="hero__hint">搜索会即时过滤海报，不刷新页面。</p>
      </div>
    </header>

    <main>
      <section class="section-head">
        <div>
          <p class="section-head__eyebrow">Poster Wall</p>
          <h2>番剧海报墙</h2>
        </div>
        <p class="section-head__count"><span id="visibleCount">{{TOTAL_COUNT}}</span> / {{TOTAL_COUNT}}</p>
      </section>

      <section class="poster-grid" id="posterGrid">
        {{POSTER_CARDS}}
      </section>

      <p class="empty-state" id="emptyState" hidden>没有匹配项，换个关键词试试。</p>
    </main>
  </div>
</body>
</html>
