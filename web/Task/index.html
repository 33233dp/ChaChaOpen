<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TaskFlow - 每日任务管理</title>
  <style>
    :root {
      --bg: #08111f;
      --bg-elevated: rgba(12, 20, 35, 0.82);
      --bg-card: rgba(17, 28, 46, 0.92);
      --border: rgba(148, 163, 184, 0.16);
      --text: #e5eefc;
      --muted: #8aa0c2;
      --accent: #4ea1ff;
      --accent-2: #7ce7d7;
      --danger: #ff7a8a;
      --success: #2fe3a0;
      --warning: #f4c95d;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Inter, "Segoe UI", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(78, 161, 255, 0.18), transparent 32%),
        radial-gradient(circle at 85% 20%, rgba(124, 231, 215, 0.14), transparent 24%),
        linear-gradient(180deg, #07111d 0%, #09101a 100%);
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px 1fr;
    }

    .sidebar {
      padding: 28px 20px;
      border-right: 1px solid var(--border);
      background: rgba(7, 13, 24, 0.75);
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      background: linear-gradient(145deg, var(--accent), #8b7bff);
      box-shadow: 0 12px 28px rgba(78, 161, 255, 0.35);
    }

    .brand h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .sidebar-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .panel {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .metric {
      padding: 14px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .metric strong {
      display: block;
      font-size: 22px;
      margin-bottom: 4px;
    }

    .metric span { color: var(--muted); font-size: 12px; }

    .filter-group,
    .quick-note {
      padding: 16px;
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 16px;
    }

    .filter-group h2,
    .quick-note h2,
    .composer h2,
    .tasks-head h2 {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .filters {
      display: grid;
      gap: 10px;
    }

    .chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
      cursor: pointer;
      transition: 0.2s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
      border-color: rgba(78, 161, 255, 0.35);
    }

    .chip.active {
      background: linear-gradient(145deg, rgba(78, 161, 255, 0.22), rgba(124, 231, 215, 0.12));
      border-color: rgba(78, 161, 255, 0.45);
    }

    .content {
      padding: 28px;
      display: grid;
      gap: 18px;
    }

    .workspace {
      display: grid;
      gap: 18px;
    }

    .hero {
      display: flex;
      gap: 20px;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 12px 0 0;
      color: var(--muted);
      max-width: 760px;
    }

    .search-wrap {
      min-width: min(420px, 100%);
      flex: 1 1 320px;
      display: grid;
      gap: 10px;
    }

    .search {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      outline: none;
    }

    .search:focus {
      border-color: rgba(78, 161, 255, 0.55);
      box-shadow: 0 0 0 4px rgba(78, 161, 255, 0.12);
    }

    .composer {
      padding: 18px;
      border-radius: var(--radius-xl);
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    .composer-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 120px auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
    }

    input, textarea, select, button {
      font: inherit;
    }

    input, textarea, select {
      width: 100%;
      color: var(--text);
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 48px;
      max-height: 140px;
    }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(124, 231, 215, 0.55);
      box-shadow: 0 0 0 4px rgba(124, 231, 215, 0.1);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 16px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(145deg, var(--accent), #2b7dff);
      color: white;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 12px 24px rgba(78, 161, 255, 0.18);
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn.secondary {
      background: rgba(255, 255, 255, 0.05);
      box-shadow: none;
      border: 1px solid var(--border);
    }
    .btn.danger {
      background: rgba(255, 122, 138, 0.16);
      color: #ffccd2;
      border: 1px solid rgba(255, 122, 138, 0.28);
      box-shadow: none;
    }

    .tasks {
      padding: 18px;
      border-radius: var(--radius-xl);
      background: var(--bg-card);
      border: 1px solid var(--border);
    }

    .tasks-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .muted { color: var(--muted); }

    .task-list {
      display: grid;
      gap: 12px;
    }

    .task {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: start;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .task:hover {
      transform: translateY(-1px);
      border-color: rgba(78, 161, 255, 0.22);
    }

    .task.done {
      opacity: 0.72;
    }

    .task.done .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-main {
      min-width: 0;
    }

    .task-title {
      margin: 0 0 6px;
      font-size: 17px;
      word-break: break-word;
    }

    .task-note {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .tag.priority-1 { color: #ffd0d5; border-color: rgba(255, 122, 138, 0.28); background: rgba(255, 122, 138, 0.12); }
    .tag.priority-2 { color: #ffe0a1; border-color: rgba(244, 201, 93, 0.28); background: rgba(244, 201, 93, 0.12); }
    .tag.priority-3 { color: #c4f3e9; border-color: rgba(47, 227, 160, 0.28); background: rgba(47, 227, 160, 0.12); }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .check {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      margin-top: 3px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .empty-state {
      padding: 40px 18px;
      text-align: center;
      color: var(--muted);
      border-radius: 20px;
      border: 1px dashed rgba(138, 160, 194, 0.24);
      background: rgba(255, 255, 255, 0.02);
    }

    dialog {
      width: min(640px, calc(100vw - 24px));
      border: 1px solid var(--border);
      border-radius: 24px;
      background: #0d1625;
      color: var(--text);
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(3, 6, 12, 0.7);
      backdrop-filter: blur(8px);
    }

    .modal {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 20px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    @media (max-width: 1080px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { border-right: 0; border-bottom: 1px solid var(--border); }
      .composer-grid { grid-template-columns: 1fr 1fr; }
      .composer-grid .wide { grid-column: 1 / -1; }
    }

    @media (max-width: 720px) {
      .content, .sidebar { padding: 16px; }
      .metric-grid { grid-template-columns: repeat(3, 1fr); }
      .task { grid-template-columns: auto 1fr; }
      .task-actions { grid-column: 1 / -1; justify-content: flex-start; }
      .composer-grid, .modal-grid { grid-template-columns: 1fr; }
      .search-wrap { min-width: 100%; }
      .modal { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div>
          <h1>TaskFlow</h1>
          <p>简洁深色的每日任务管理</p>
        </div>
      </div>

      <div class="sidebar-actions">
        <a class="btn secondary" href="/heatmap" style="text-decoration:none">查看热力图</a>
      </div>

      <div class="metric-grid">
        <div class="metric"><strong id="metric-total">0</strong><span>全部</span></div>
        <div class="metric"><strong id="metric-active">0</strong><span>进行中</span></div>
        <div class="metric"><strong id="metric-done">0</strong><span>已完成</span></div>
      </div>

      <div class="quick-note">
        <h2>快速说明</h2>
        <div class="muted" style="line-height:1.7">
          点击任务左侧圆点可切换完成状态。
          右侧按钮支持编辑、删除和按条件筛选。
          热力图已拆分到独立页面，点击上方按钮即可打开。
        </div>
      </div>

      <div class="filter-group">
        <h2>筛选</h2>
        <div class="filters">
          <button class="chip active" data-status="all" type="button">全部 <span id="count-all">0</span></button>
          <button class="chip" data-status="active" type="button">待办 <span id="count-active">0</span></button>
          <button class="chip" data-status="completed" type="button">已完成 <span id="count-completed">0</span></button>
        </div>
      </div>
    </aside>

    <main class="content">
      <section class="hero">
        <div>
          <h2>把一天的事情，放进一个轻快的清单里。</h2>
          <p>这是一个参考微软待办风格的现代简约任务应用，使用 Python + SQLite 做持久化存储，打开即用，响应迅速。</p>
        </div>
        <div class="search-wrap">
          <label>
            <span>搜索任务</span>
            <input id="search" class="search" type="search" placeholder="按标题或备注搜索" />
          </label>
        </div>
      </section>

      <div class="workspace">
        <section class="composer">
          <h2>新建任务</h2>
          <form id="create-form" class="composer-grid">
            <label class="wide">
              <span>任务标题</span>
              <input name="title" type="text" maxlength="120" placeholder="例如：整理会议纪要" required />
            </label>
            <label>
              <span>截止日期</span>
              <input name="due_date" type="date" />
            </label>
            <label>
              <span>优先级</span>
              <select name="priority">
                <option value="3">高</option>
                <option value="2" selected>中</option>
                <option value="1">低</option>
              </select>
            </label>
            <label class="wide">
              <span>备注</span>
              <textarea name="note" maxlength="500" placeholder="补充上下文、步骤或链接"></textarea>
            </label>
            <button class="btn" type="submit">添加任务</button>
          </form>
        </section>

        <section class="tasks">
          <div class="tasks-head">
            <div>
              <h2>任务列表</h2>
              <div id="summary" class="muted">正在加载任务…</div>
            </div>
            <div class="task-actions">
              <button class="btn secondary" id="refresh-btn" type="button">刷新</button>
            </div>
          </div>
          <div id="task-list" class="task-list" aria-live="polite"></div>
        </section>
      </div>
    </main>
  </div>

  <dialog id="edit-dialog">
    <form id="edit-form" class="modal" method="dialog">
      <div class="modal-head">
        <div>
          <h3>编辑任务</h3>
          <p class="muted" style="margin:8px 0 0">修改后会立即保存到 SQLite 数据库。</p>
        </div>
        <button class="btn secondary" value="cancel" type="submit">关闭</button>
      </div>

      <input type="hidden" name="id" />
      <div class="modal-grid">
        <label class="wide">
          <span>任务标题</span>
          <input name="title" type="text" maxlength="120" required />
        </label>
        <label>
          <span>截止日期</span>
          <input name="due_date" type="date" />
        </label>
        <label>
          <span>优先级</span>
          <select name="priority">
            <option value="3">高</option>
            <option value="2">中</option>
            <option value="1">低</option>
          </select>
        </label>
        <label class="wide">
          <span>备注</span>
          <textarea name="note" maxlength="500"></textarea>
        </label>
      </div>
      <div class="modal-actions">
        <button class="btn danger" id="delete-from-edit" type="button">删除</button>
        <button class="btn secondary" value="cancel" type="submit">取消</button>
        <button class="btn" id="save-edit" type="button">保存</button>
      </div>
    </form>
  </dialog>

  <script>
    const state = {
      tasks: [],
      stats: { total: 0, active: 0, completed: 0 },
      status: 'all',
      query: '',
      editingTask: null
    };
    let loadRequestId = 0;

    const priorityLabel = { 1: '低', 2: '中', 3: '高' };

    const els = {
      taskList: document.getElementById('task-list'),
      summary: document.getElementById('summary'),
      search: document.getElementById('search'),
      refreshBtn: document.getElementById('refresh-btn'),
      createForm: document.getElementById('create-form'),
      editDialog: document.getElementById('edit-dialog'),
      editForm: document.getElementById('edit-form'),
      deleteFromEdit: document.getElementById('delete-from-edit'),
      saveEdit: document.getElementById('save-edit'),
      metricTotal: document.getElementById('metric-total'),
      metricActive: document.getElementById('metric-active'),
      metricDone: document.getElementById('metric-done'),
      countAll: document.getElementById('count-all'),
      countActive: document.getElementById('count-active'),
      countCompleted: document.getElementById('count-completed')
    };

    function api(path, options = {}) {
      return fetch(path, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options
      }).then(async (response) => {
        const payload = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(payload.error || `请求失败: ${response.status}`);
        }
        return payload;
      });
    }

    function formatDueDate(value) {
      if (!value) return '未设置截止日期';
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('zh-CN', { month: 'short', day: 'numeric', weekday: 'short' }).format(date);
    }

    function formatCalendarDate(value) {
      if (!value) return '';
      const date = new Date(`${value}T00:00:00`);
      if (Number.isNaN(date.getTime())) return value;
      return new Intl.DateTimeFormat('zh-CN', { year: 'numeric', month: 'short', day: 'numeric', weekday: 'short' }).format(date);
    }

    function getDueStatus(task) {
      if (!task.due_date) return '未设置';
      const today = new Date();
      const due = new Date(`${task.due_date}T00:00:00`);
      today.setHours(0, 0, 0, 0);
      if (due < today && !task.completed) return '已逾期';
      if (due.getTime() === today.getTime()) return '今天到期';
      return '截止';
    }

    function priorityClass(priority) {
      return `priority-${priority}`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text ?? '';
      return div.innerHTML;
    }

    async function loadDashboard() {
      const requestId = ++loadRequestId;
      const [tasksPayload, statsPayload] = await Promise.all([
        api(`/api/tasks?status=${encodeURIComponent(state.status)}&q=${encodeURIComponent(state.query)}`),
        api('/api/stats')
      ]);
      if (requestId !== loadRequestId) return;
      state.tasks = tasksPayload.tasks || [];
      state.stats = statsPayload;
      render();
    }

    function renderStats() {
      const { total, active, completed } = state.stats;
      els.metricTotal.textContent = total;
      els.metricActive.textContent = active;
      els.metricDone.textContent = completed;
      els.countAll.textContent = total;
      els.countActive.textContent = active;
      els.countCompleted.textContent = completed;
    }

    function renderTasks() {
      if (!state.tasks.length) {
        els.taskList.innerHTML = `
          <div class="empty-state">
            <strong>当前没有任务</strong>
            <div style="margin-top:8px">试着创建一个新任务，或者切换筛选条件。</div>
          </div>
        `;
        return;
      }

      els.taskList.innerHTML = state.tasks.map((task) => {
        const dueText = formatDueDate(task.due_date);
        const dueState = getDueStatus(task);
        const completedClass = task.completed ? 'done' : '';
        return `
          <article class="task ${completedClass}">
            <input class="check" type="checkbox" ${task.completed ? 'checked' : ''} data-action="toggle" data-id="${task.id}" aria-label="切换任务完成状态" />
            <div class="task-main">
              <h3 class="task-title">${escapeHtml(task.title)}</h3>
              ${task.note ? `<p class="task-note">${escapeHtml(task.note)}</p>` : ''}
              <div class="task-meta">
                <span class="tag ${priorityClass(task.priority)}">优先级 ${priorityLabel[task.priority] || task.priority}</span>
                <span class="tag">${escapeHtml(dueText)}</span>
                <span class="tag">${escapeHtml(dueState)}</span>
                ${task.completed && task.completed_at ? `<span class="tag">完成于 ${escapeHtml(formatCalendarDate(task.completed_at))}</span>` : ''}
              </div>
            </div>
            <div class="task-actions">
              <button class="btn secondary" type="button" data-action="edit" data-id="${task.id}">编辑</button>
              <button class="btn danger" type="button" data-action="delete" data-id="${task.id}">删除</button>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderSummary() {
      const total = state.stats.total;
      const active = state.stats.active;
      const completed = state.stats.completed;
      const scopeLabel = state.status === 'all' ? '全部' : state.status === 'active' ? '待办' : '已完成';
      const queryLabel = state.query ? `，关键词「${state.query}」` : '';
      els.summary.textContent = `${scopeLabel}${queryLabel} 当前显示 ${state.tasks.length} 条，全部共 ${total} 条，${active} 条待办，${completed} 条已完成。`;
    }

    function render() {
      renderStats();
      renderTasks();
      renderSummary();
      document.querySelectorAll('.chip').forEach((chip) => {
        chip.classList.toggle('active', chip.dataset.status === state.status);
      });
    }

    async function createTask(form) {
      const formData = new FormData(form);
      const payload = {
        title: formData.get('title'),
        note: formData.get('note'),
        due_date: formData.get('due_date'),
        priority: Number(formData.get('priority') || 2)
      };
      await api('/api/tasks', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      form.reset();
      form.querySelector('[name="priority"]').value = '2';
      await loadDashboard();
    }

    async function toggleTask(id) {
      await api(`/api/tasks/${id}/toggle`, { method: 'PATCH', body: JSON.stringify({}) });
      await loadDashboard();
    }

    async function deleteTask(id) {
      if (!confirm('确认删除这条任务吗？')) return;
      await api(`/api/tasks/${id}`, { method: 'DELETE' });
      await loadDashboard();
    }

    function openEditor(task) {
      state.editingTask = task;
      const form = els.editForm;
      form.elements.id.value = task.id;
      form.elements.title.value = task.title;
      form.elements.note.value = task.note || '';
      form.elements.due_date.value = task.due_date || '';
      form.elements.priority.value = String(task.priority || 2);
      els.editDialog.showModal();
    }

    async function saveTask() {
      const form = els.editForm;
      const id = form.elements.id.value;
      const payload = {
        title: form.elements.title.value,
        note: form.elements.note.value,
        due_date: form.elements.due_date.value,
        priority: Number(form.elements.priority.value || 2)
      };
      await api(`/api/tasks/${id}`, {
        method: 'PATCH',
        body: JSON.stringify(payload)
      });
      els.editDialog.close();
      await loadDashboard();
    }

    function bindEvents() {
      els.createForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        await createTask(els.createForm);
      });

      els.search.addEventListener('input', async (event) => {
        state.query = event.target.value.trim();
        await loadDashboard();
      });

      els.refreshBtn.addEventListener('click', loadDashboard);

      document.querySelectorAll('.chip').forEach((chip) => {
        chip.addEventListener('click', async () => {
          state.status = chip.dataset.status;
          await loadDashboard();
        });
      });

      els.taskList.addEventListener('click', async (event) => {
        const button = event.target.closest('[data-action]');
        if (!button) return;
        const id = button.dataset.id;
        const task = state.tasks.find((item) => String(item.id) === String(id));
        if (button.dataset.action === 'edit' && task) {
          openEditor(task);
        } else if (button.dataset.action === 'delete') {
          await deleteTask(id);
        }
      });

      els.taskList.addEventListener('change', async (event) => {
        const checkbox = event.target.closest('[data-action="toggle"]');
        if (!checkbox) return;
        await toggleTask(checkbox.dataset.id);
      });

      els.saveEdit.addEventListener('click', async () => {
        await saveTask();
      });

      els.deleteFromEdit.addEventListener('click', async () => {
        if (!state.editingTask) return;
        const id = state.editingTask.id;
        els.editDialog.close();
        await deleteTask(id);
      });

      els.editDialog.addEventListener('close', () => {
        state.editingTask = null;
      });
    }

    bindEvents();
    loadDashboard().catch((error) => {
      console.error(error);
      els.summary.textContent = '加载失败，请刷新页面重试。';
      els.taskList.innerHTML = `<div class="empty-state"><strong>无法加载任务</strong><div style="margin-top:8px">${escapeHtml(error.message)}</div></div>`;
    });
  </script>
</body>
</html>
